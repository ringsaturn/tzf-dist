name: release

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  upload-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Upload release assets and update release notes
        uses: softprops/action-gh-release@v2
        with:
          body_path: STATS.md
          files: |
            combined-with-oceans.compress.topo.bin
            combined-with-oceans.topology.compress.topo.bin
            combined-with-oceans.reduce.preindex.bin
            checksums.md5

  publish-crate:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    environment:
      name: publish
      url: https://crates.io/crates/tzf-dist
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(cargo pkgid | sed -E 's/.*#//')"

          if [ "${tag_version}" != "${cargo_version}" ]; then
            echo "Tag version ${tag_version} does not match Cargo.toml version ${cargo_version}."
            exit 1
          fi

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
