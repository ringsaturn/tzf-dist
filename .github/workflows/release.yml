name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.0.2026-a)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  upload-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Upload release assets and update release notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          body_path: STATS.md
          files: |
            combined-with-oceans.compress.topo.bin
            combined-with-oceans.topology.compress.topo.bin
            combined-with-oceans.topology.preindex.bin
            checksums.md5

  publish-crate:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'release' && github.event.release.target_commitish == 'data') ||
      github.event_name == 'workflow_dispatch'
    environment:
      name: publish
      url: https://crates.io/crates/tzf-dist
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo version
        shell: bash
        run: |
          tag_name="${{ inputs.tag || github.ref_name }}"
          tag_version="${tag_name#v}"
          cargo_version="$(cargo pkgid | sed -E 's/.*#//')"

          if [ "${tag_version}" != "${cargo_version}" ]; then
            echo "Tag version ${tag_version} does not match Cargo.toml version ${cargo_version}."
            exit 1
          fi

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
